name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: node scripts/check-doc-links.mjs
      - run: node scripts/lint-architecture.mjs
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
