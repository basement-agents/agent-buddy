name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (typecheck, lint, test, harness checks)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies (npm ci)
        run: npm ci

      - name: Verify markdown links resolve
        run: node scripts/check-doc-links.mjs

      - name: Verify dependency direction (core is leaf)
        run: node scripts/lint-architecture.mjs

      - name: TypeScript typecheck (turbo)
        run: npm run typecheck

      - name: Lint (oxlint)
        run: npm run lint

      - name: Test (vitest)
        run: npm run test
